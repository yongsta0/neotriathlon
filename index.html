<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a3e72">
<title>TRI В· Performance Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #ececec;
    --border-soft: #f3f3f1;
    --text: #0f0f0f;
    --muted: #6b6b6b;
    --subtle: #a0a0a0;
    --accent: #0a2540;
    --accent-hover: #163a5f;
    --accent-soft: #eef2f7;
    --success: #1f6b3a;
    --warning: #b7790e;
    --danger: #a8362a;
    --radius: 10px;
    --radius-lg: 14px;
    font-family: 'Inter', -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  * { box-sizing: border-box; min-width: 0; }
  html, body { background: var(--bg); overflow-x: hidden; }
  body { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; color: var(--text); -webkit-text-size-adjust: 100%; font-size: 14px; line-height: 1.5; }

  /* н—ӨлҚ” */
  .hero { padding: 20px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 32px; position: relative; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .brand .logo { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
  .brand .logo .dot { color: var(--danger); }
  .brand .tag { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .hero-title { font-size: 44px; font-weight: 800; letter-spacing: -0.035em; margin: 22px 0 12px; line-height: 1.05; color: var(--text); background: linear-gradient(135deg, var(--text) 0%, var(--accent) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub { color: var(--muted); font-size: 15px; margin: 0 0 24px; max-width: 620px; line-height: 1.5; }
  .hero-sub b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* лӮҙл№„кІҢмқҙм…ҳ нғӯ */
  .nav-tabs { display: flex; gap: 2px; margin: 4px 0 0; }
  .nav-tabs a { padding: 10px 18px; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; font-weight: 500; text-decoration: none; letter-spacing: 0.01em; }
  .nav-tabs a:hover { color: var(--text); }
  .nav-tabs a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--text); }
  h2 { font-size: 13px; font-weight: 600; margin: 28px 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  @media (max-width: 640px) {
    .hero-title { font-size: 32px; }
    .hero-sub { font-size: 14px; }
    .hero { padding-bottom: 28px; margin-bottom: 22px; }
    .nav-tabs a { padding: 9px 12px; font-size: 12px; }
  }

  /* кІҖмғүл°” */
  .controls { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  @media (max-width: 720px) { .controls { grid-template-columns: 1fr 1fr; } .controls input[type=text] { grid-column: 1 / -1; } }
  input, select { font-family: inherit; font-size: 14px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; width: 100%; }
  input::placeholder { color: var(--subtle); }
  input:focus, select:focus { border-color: var(--accent); }
  select { cursor: pointer; }

  /* м№ҙл“ң кё°ліё */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin: 10px 0; }
  .card > h3 { font-size: 11px; margin: 0 0 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

  /* н…Ңмқҙлё” */
  .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 11px 14px; border-bottom: 1px solid var(--border-soft); text-align: left; white-space: nowrap; }
  thead th { background: var(--bg); color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; position: sticky; top: 0; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--accent-soft); }
  td.r { text-align: right; font-variant-numeric: tabular-nums; }
  .pill { display:inline-block; background: var(--accent-soft); color: var(--accent); padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-right: 4px; }
  .empty { color: var(--subtle); padding: 40px 0; text-align: center; font-size: 13px; }

  /* лҸҷлӘ…мқҙмқё нӣ„ліҙ */
  .candidates { margin: 14px 0; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); font-size: 13px; color: var(--muted); }
  .candidates b { color: var(--text); font-weight: 600; }
  .cand-btn { display:inline-block; margin: 8px 6px 0 0; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text); transition: all .15s; }
  .cand-btn:hover { border-color: var(--accent); }
  .cand-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .summary { margin: 16px 0 12px; font-size: 13px; color: var(--muted); display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
  .summary b { color: var(--text); font-weight: 600; }

  /* нҶөкі„ м№ҙл“ң */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 14px 0; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .stat-value { font-size: 24px; font-weight: 700; margin-top: 6px; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .stat-sub { font-size: 11px; color: var(--subtle); margin-top: 4px; }

  /* м°ЁнҠё */
  .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin: 10px 0; }
  .chart-box h2 { margin-top: 0 !important; }
  .chart-box canvas { max-height: 280px; }
  .two-col { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .race-pick { font-size: 12px; color: var(--muted); margin: 4px 0 12px; }
  .race-pick select { font-size: 13px; padding: 6px 10px; }
  .tabs { display: flex; gap: 6px; margin: 0 0 14px; flex-wrap: wrap; }
  .tab { font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); background: var(--surface); border-radius: 20px; cursor: pointer; color: var(--muted); font-weight: 500; transition: all .15s; }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* мғҒнғң мғүмғҒ */
  .delta-up   { color: var(--danger); }
  .delta-down { color: var(--success); }
  .na { color: var(--subtle); }
  .bad { color: var(--danger); cursor: help; border-bottom: 1px dotted var(--danger); }

  /* кұ°лҰ¬ л°°м§Җ */
  .dist-pill { display:inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-right: 5px; font-weight: 600; cursor: help; letter-spacing: 0.02em; }
  .variant-tag { display:inline-block; font-size: 9px; padding: 2px 7px; border-radius: 10px; margin-right: 5px; font-weight: 700; background: #fff4e6; color: #8a4a1a; border: 1px solid #f5d9b8; cursor: help; text-transform: uppercase; letter-spacing: 0.04em; }
  .dist-sprint { background: #fff4e6; color: #8a4a1a; }
  .dist-short  { background: #fffaeb; color: #7a5b00; }
  .dist-std    { background: #eef2f7; color: var(--accent); }
  .dist-half   { background: #fff0ef; color: var(--danger); }
  .dist-full   { background: #f3eef7; color: #4a1a8a; }
  .dist-other  { background: #f2f2f2; color: #666; }

  .predict-link { display:inline-block; padding: 8px 16px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 20px; font-size: 12px; font-weight: 600; transition: background .15s; letter-spacing: 0.01em; }
  .predict-link:hover { background: var(--accent-hover); }

  /* н”„лЎңн•„ л¶„м„қ м„№м…ҳ */
  .profile-section { margin: 18px 0 24px; }
  .profile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 1080px) { .profile-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .profile-grid { grid-template-columns: 1fr; } }
  .pf-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
  .pf-card h3 { font-size: 10px; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .strength-bar { display:flex; align-items:center; gap: 10px; margin: 9px 0; font-size: 12px; }
  .strength-bar .sb-label { width: 42px; color: var(--text); font-weight: 600; }
  .strength-bar .sb-track { flex: 1; background: var(--border-soft); border-radius: 10px; height: 6px; position: relative; }
  .strength-bar .sb-fill  { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--success), #8cc64a, #f5c13a, #e88a3a, var(--danger)); }
  .strength-bar .sb-mark  { position: absolute; top: -4px; width: 2px; height: 14px; background: var(--text); border-radius: 1px; }
  .strength-bar .sb-val   { width: 52px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: 11px; }
  .strength-tag { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tag-strong { background: #e9f4ed; color: var(--success); }
  .tag-weak   { background: #fdeceb; color: var(--danger); }
  .tag-neutral { background: var(--bg); color: var(--muted); }
  .profile-overview { font-size: 14px; line-height: 1.75; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; }
  .profile-overview b { font-weight: 700; }
  .profile-overview .ins-strong { color: var(--success); }
  .insight-card { grid-column: 1 / -1; background: linear-gradient(180deg, #fff 0%, #fafaf8 100%); }
  .insight-card h3 { margin-bottom: 10px; }
  .insight-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .ins-tag { font-size: 11px; padding: 4px 11px; border-radius: 12px; font-weight: 600; border: 1px solid; }
  .ins-tag-good  { background: #f0f7f1; color: var(--success); border-color: #c9e3cd; }
  .ins-tag-bad   { background: #fdf2f0; color: var(--danger);  border-color: #f5d5d0; }
  .ins-tag-focus { background: #fff4e6; color: #8a4a1a;         border-color: #f5d9b8; }
  .insight-para { font-size: 13px; line-height: 1.65; color: var(--text); margin-bottom: 9px; }
  .insight-para b { font-weight: 700; }
  .insight-para .ins-strong { color: var(--success); }
  .insight-para .ins-weak   { color: var(--danger); }
  .insight-para .ins-gain   { color: var(--accent); }
  .insight-basis { font-size: 11px; color: var(--muted); background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; line-height: 1.55; }
  .insight-basis .basis-title { font-weight: 600; color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .insight-basis b { color: var(--text); font-weight: 600; }
  .insight-basis .basis-parts { margin: 0; padding-left: 16px; font-size: 12px; color: var(--text); }
  .insight-basis .basis-parts li { margin: 2px 0; }
  .insight-basis .basis-note-pure { margin-top: 8px; padding: 7px 10px; background: var(--accent-soft); border-radius: 6px; color: var(--accent); font-size: 11px; line-height: 1.5; }
  .insight-basis .basis-note-pure b { color: var(--accent); font-weight: 700; }
  .insight-basis .basis-warn { margin-top: 8px; padding: 8px 10px; background: #fdf8ea; border: 1px solid #f0e1b8; border-radius: 6px; color: var(--warning); font-size: 11px; line-height: 1.5; }
  .insight-basis .basis-warn b { color: var(--warning); }
  .insight-tip { margin-top: 12px; padding: 12px 14px; background: var(--accent-soft); border-radius: var(--radius); font-size: 12px; line-height: 1.6; color: var(--text); border-left: 3px solid var(--accent); }
  .insight-tip b { color: var(--accent); font-weight: 700; display: inline-block; margin-bottom: 3px; }
  .rivals-card { grid-column: 1 / -1; }
  .rival-row { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 12px; align-items: center; padding: 9px 10px; border-bottom: 1px solid var(--border-soft); font-size: 12px; border-radius: 8px; }
  .rival-row:last-child { border-bottom: none; }
  .rival-row.me { background: var(--accent-soft); border: 1px solid #d9e0e9; margin: 4px 0; }
  .rival-row.above { opacity: 0.95; }
  .rival-row.below { opacity: 0.95; }
  .rival-row .rv-name a { color: var(--text); font-weight: 600; }
  .rival-row .rv-name a:hover { color: var(--accent); text-decoration: none; }
  .rival-row .rv-club { display: block; font-size: 10px; color: var(--subtle); margin-top: 2px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rival-row .rv-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text); font-size: 13px; }
  .rival-row .rv-diff { display: block; font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .rival-row.above .rv-diff { color: var(--success); }
  .rival-row.below .rv-diff { color: var(--danger); }
  .rival-row .rv-strength { font-size: 11px; color: var(--muted); text-align: right; }
  .rivals-divider { height: 0; border-top: 1px dashed var(--border); margin: 4px 0; }
  .best-row { display:flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border-soft); font-size: 12px; }
  .best-row:last-child { border-bottom: none; }
  .best-row .br-dist { font-weight: 600; color: var(--text); font-size: 12px; }
  .best-row .br-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text); }
  .best-row .br-sub  { display: block; font-size: 10px; color: var(--subtle); margin-top: 2px; font-weight: 400; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trend-line { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .trend-line b { font-variant-numeric: tabular-nums; color: var(--text); }
  .trend-up   { color: var(--danger) !important; }
  .trend-down { color: var(--success) !important; }
  .muted { color: var(--subtle); font-size: 11px; }

  /* н’Җ лҢҖл№„ л¶„м„қ */
  .pop-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-soft); font-size: 12px; }
  .pop-row:last-child { border-bottom: none; }
  .pop-row .p-label { color: var(--muted); font-weight: 500; width: 60px; }
  .pop-row .p-val { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }
  .pop-row .p-bar { flex: 1; margin: 0 10px; height: 4px; background: var(--border-soft); border-radius: 2px; position: relative; }
  .pop-row .p-bar-fill { position: absolute; height: 100%; background: var(--accent); border-radius: 2px; }
  .pop-row .p-pct { width: 40px; text-align: right; font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* лӘЁл°”мқј */
  @media (max-width: 640px) {
    body { margin: 14px auto; padding: 0 12px; }
    h1 { font-size: 19px; }
    h2 { font-size: 14px; margin: 18px 0 6px; }
    .sub { font-size: 12px; margin-bottom: 14px; }
    input, select { font-size: 16px; padding: 10px 10px; } /* 16px вҶ’ iOS мһҗлҸҷ нҷ•лҢҖ л°©м§Җ */
    .controls { gap: 6px; }
    .controls input[type=text] { flex: 1 1 100%; }
    .controls select { flex: 1 1 calc(50% - 3px); }
    table { font-size: 12px; }
    th, td { padding: 5px 6px; }
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { padding: 10px; }
    .stat-value { font-size: 18px; }
    .chart-box { padding: 10px; }
    .chart-box canvas { max-height: 240px; }
    .pill { font-size: 11px; padding: 1px 6px; }
    .tab { padding: 6px 10px; font-size: 12px; }
    .candidates { font-size: 12px; padding: 8px 10px; }
  }
  @media (max-width: 380px) {
    .stat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header class="hero">
  <div class="brand">
    <div class="logo">TRI<span class="dot">В·</span>PE</div>
    <div class="tag">Korean Triathlon Analytics</div>
  </div>
  <nav class="nav-tabs">
    <a href="./" class="active">Explore</a>
    <a href="predict.html">Predictor</a>
    <a href="team.html">Club Rankings</a>
  </nav>
  <h1 class="hero-title">Find your edge.<br>Measure every split.</h1>
  <p class="hero-sub" id="datasub">лҢҖн•ңмІ мқё3мў…нҳ‘нҡҢ кіөк°ң кё°лЎқмқ„ кё°л°ҳмңјлЎң к°ңмқё м¶”мқҙ, м „мІҙ н’Җ лҢҖл№„ мң„м№ҳ, мҳҲмғҒкё°лЎқмқ„ л¶„м„қн•©лӢҲлӢӨ.</p>
</header>

<div class="controls">
  <input id="q" type="text" placeholder="мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ” (мҳҲ: к№ҖмІ мҲҳ)" autofocus>
  <select id="club"><option value="">мҶҢмҶҚ м „мІҙ</option></select>
  <select id="dist"><option value="">кұ°лҰ¬ м „мІҙ</option></select>
  <select id="part"><option value="">л¶Җл¬ё м „мІҙ</option></select>
</div>

<div id="candidates"></div>
<div id="summary" class="summary"></div>

<div id="profile"></div>

<div id="stats"></div>

<div id="charts"></div>

<h2 id="record-heading" style="display:none">кё°лЎқ лӘ©лЎқ</h2>
<div id="result"></div>

<script>
let DATA = [];
let DISTANCES = {}; // 'tour||part' вҶ’ {swim_km, bike_km, run_km}
let POP_STATS = {}; // dist_cat вҶ’ {swim:{arr,sorted}, bike, run, total, ratios}
let charts = {};
let lastAutoDistKey = ''; // 'name||club' мЎ°н•©мқҙ л°”лҖ” л•Ңл§Ң auto-select мһ¬м Ғмҡ©

// м „мІҙ н’Җ кё°л°ҳ кұ°лҰ¬ м№ҙн…Ңкі лҰ¬лі„ нҶөкі„ л№Ңл“ң
function buildPopulationStats() {
  const buckets = {}; // cat вҶ’ {s:[], b:[], r:[], t:[], rows:[]}
  for (const rec of DATA) {
    const cat = classifyDistance(distInfo(rec)) || 'other';
    // н‘ңмӨҖмқҖ мҲңмҲҳ н‘ңмӨҖ(1.5/40/10, л“Җм• мҠ¬лЎ В·лӢЁм¶• м ңмҷё)л§Ң м „мІҙ н’Җ нҶөкі„м—җ л°ҳмҳҒ
    if (cat === 'standard' && !isPureStandard(rec)) continue;
    if (!buckets[cat]) buckets[cat] = { s:[], b:[], r:[], t:[], t1:[], t2:[] };
    const s = cleanSec(rec.swim, 'swim');
    const b = cleanSec(rec.bike, 'bike');
    const rn = cleanSec(rec.run, 'run');
    const tot = cleanSec(rec.total, 'total');
    const t1 = cleanSec(rec.t1, 't1');
    const t2 = cleanSec(rec.t2, 't2');
    if (s != null) buckets[cat].s.push(s);
    if (b != null) buckets[cat].b.push(b);
    if (rn != null) buckets[cat].r.push(rn);
    if (tot != null) buckets[cat].t.push(tot);
    if (t1 != null) buckets[cat].t1.push(t1);
    if (t2 != null) buckets[cat].t2.push(t2);
  }
  const stats = {};
  for (const cat in buckets) {
    const b = buckets[cat];
    const pctl = (arr, p) => {
      if (arr.length === 0) return null;
      const sorted = [...arr].sort((a,b) => a-b);
      const idx = Math.floor((p/100) * (sorted.length - 1));
      return sorted[idx];
    };
    const mean = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
    // м •л ¬лҗң л°°м—ҙлҸ„ м ҖмһҘ (percentile rank кі„мӮ°мҡ©)
    stats[cat] = {
      n: b.t.length,
      swim: { arr: b.s, sorted: [...b.s].sort((a,b)=>a-b), mean: mean(b.s), p10: pctl(b.s,10), p25: pctl(b.s,25), p50: pctl(b.s,50), p75: pctl(b.s,75), p90: pctl(b.s,90) },
      bike: { arr: b.b, sorted: [...b.b].sort((a,b)=>a-b), mean: mean(b.b), p10: pctl(b.b,10), p25: pctl(b.b,25), p50: pctl(b.b,50), p75: pctl(b.b,75), p90: pctl(b.b,90) },
      run:  { arr: b.r, sorted: [...b.r].sort((a,b)=>a-b), mean: mean(b.r), p10: pctl(b.r,10), p25: pctl(b.r,25), p50: pctl(b.r,50), p75: pctl(b.r,75), p90: pctl(b.r,90) },
      total:{ arr: b.t, sorted: [...b.t].sort((a,b)=>a-b), mean: mean(b.t), p10: pctl(b.t,10), p25: pctl(b.t,25), p50: pctl(b.t,50), p75: pctl(b.t,75), p90: pctl(b.t,90) },
      t1:   { mean: mean(b.t1) },
      t2:   { mean: mean(b.t2) },
    };
    // мҙқкё°лЎқ лҢҖл№„ кө¬к°„ нҸүк·  л№„мңЁ
    const n = Math.min(b.s.length, b.b.length, b.r.length, b.t.length);
    if (n > 0) {
      let ss=0, bs=0, rs=0;
      // л¶Җл¶„м ҒмңјлЎң к°ҷмқҖ мҲңм„ңлҘј м•Ң мҲҳ м—Ҷм–ҙ к°ңлі„ нҸүк·  мӮ¬мҡ©
      const avgS = stats[cat].swim.mean || 0;
      const avgB = stats[cat].bike.mean || 0;
      const avgR = stats[cat].run.mean  || 0;
      const avgT1 = stats[cat].t1.mean || 0;
      const avgT2 = stats[cat].t2.mean || 0;
      const avgTotal = stats[cat].total.mean || 1;
      stats[cat].ratios = {
        s: avgS / avgTotal,
        b: avgB / avgTotal,
        r: avgR / avgTotal,
        t1: avgT1 / avgTotal,
        t2: avgT2 / avgTotal,
      };
    }
  }
  return stats;
}

// м •л ¬лҗң л°°м—ҙм—җм„ң к°’мқҳ percentile rank кі„мӮ° (к°’мқҙ лӮ®мқ„мҲҳлЎқ мғҒмң„, мһ‘мқҖ к°’ вҶ’ мғҒмң„ %)
function percentileRank(sorted, v) {
  if (!sorted || sorted.length === 0 || v == null) return null;
  let lo = 0, hi = sorted.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (sorted[mid] < v) lo = mid + 1;
    else hi = mid;
  }
  // lo = ліёмқё мқҙмғҒмқё мІ« мқёлҚұмҠӨ. мғҒмң„ % = lo/n * 100
  return (lo / sorted.length) * 100;
}

// кұ°лҰ¬ м •ліҙ вҶ’ н‘ңмӨҖ м№ҙн…Ңкі лҰ¬ (м •нҷ•н•ң л§Өм№ҳл§Ң)
// н‘ңмӨҖ кұ°лҰ¬мҷҖ лӢӨлҘҙл©ҙ custom м№ҙн…Ңкі лҰ¬лЎң л¶„лҰ¬ (мҳҲмғҒкё°лЎқ кі„мӮ° мӢң м„һмқҙм§Җ м•ҠлҸ„лЎқ)
function classifyDistance(d) {
  if (!d || d.swim_km == null || d.bike_km == null || d.run_km == null) return null;
  const s = d.swim_km, b = d.bike_km, r = d.run_km;
  const near = (a, x) => Math.abs(a - x) < 0.06;
  // м •нҷ• л§Өм№ҳ (кіөмӢқ ITU кұ°лҰ¬)
  if (near(s, 0.3)  && near(b, 8)   && near(r, 2))                         return 'super_sprint';
  if (near(s, 0.3)  && near(b, 10)  && near(r, 2.5))                       return 'super_sprint';
  if (near(s, 0.75) && near(b, 20)  && near(r, 5))                         return 'sprint';
  if (near(s, 1.5)  && near(b, 40)  && near(r, 10))                        return 'standard';
  if ((near(s, 1.9) || near(s, 2.0)) && (near(b, 85) || near(b, 90))
      && (near(r, 20) || near(r, 21) || near(r, 21.1)))                    return 'half';
  if (near(s, 3.8)  && near(b, 180) && (near(r, 42) || near(r, 42.2)))     return 'full';
  // л№„м •нҳ• вҖ” кі мң  key лЎң л¶„лҰ¬н•ҳм—¬ н‘ңмӨҖкіј м„һмқҙм§Җ м•ҠкІҢ
  const fmt = v => (v % 1 === 0 ? String(v) : String(+v.toFixed(2)));
  return 'custom:' + fmt(s) + '/' + fmt(b) + '/' + fmt(r);
}
const DIST_LABEL = {
  super_sprint: 'мҠҲнҚјмҠӨн”„лҰ°нҠё',
  sprint: 'мҠӨн”„лҰ°нҠё',
  standard: 'н‘ңмӨҖ',
  half: 'н•ҳн”„',
  full: 'н’Җ',
  other: 'кё°нғҖ',
};
function labelOfCat(cat) {
  if (!cat) return 'кё°нғҖ';
  if (cat.startsWith('custom:')) {
    const parts = cat.slice(7).split('/').map(Number);
    const [ss, bs, rs] = parts;
    // н‘ңмӨҖ/н•ҳн”„мҷҖ 'м–ҙл–Ө кө¬к°„л§Ң' лӢӨлҘём§Җ нҷ•мқё вҶ’ м№ңм Ҳн•ң лқјлІЁ
    if (bs === 40 && rs === 10 && ss !== 1.5) return `н‘ңмӨҖ ліҖнҳ• В· мҲҳмҳҒ ${ss}km`;
    if (ss === 1.5 && rs === 10 && bs !== 40) return `н‘ңмӨҖ ліҖнҳ• В· мӮ¬мқҙнҒҙ ${bs}km`;
    if (ss === 1.5 && bs === 40 && rs !== 10) return `н‘ңмӨҖ ліҖнҳ• В· лҹ° ${rs}km`;
    if ((bs === 90 || bs === 85) && (rs === 21 || rs === 21.1 || rs === 20) && Math.abs(ss - 1.9) > 0.1) return `н•ҳн”„ ліҖнҳ• В· мҲҳмҳҒ ${ss}km`;
    if (ss === 1.9 && rs >= 20 && bs !== 90 && bs !== 85) return `н•ҳн”„ ліҖнҳ• В· мӮ¬мқҙнҒҙ ${bs}km`;
    return `${ss}/${bs}/${rs}km`;
  }
  return DIST_LABEL[cat] || 'кё°нғҖ';
}
const DIST_BADGE_CLS = {
  super_sprint: 'dist-sprint',
  sprint:   'dist-sprint',
  standard: 'dist-std',
  half:     'dist-half',
  full:     'dist-full',
  other:    'dist-other',
};
function clsOfCat(cat) {
  if (!cat) return 'dist-other';
  if (cat.startsWith('custom:')) return 'dist-other';
  return DIST_BADGE_CLS[cat] || 'dist-other';
}
function distInfo(r) {
  return DISTANCES[r.tour + '||' + r.part] || null;
}
function distCat(r) {
  return classifyDistance(distInfo(r)) || 'other';
}
// мҲңмҲҳ мҳ¬лҰјн”Ҫ н‘ңмӨҖ(1.5/40/10, лӢЁм¶•В·л“Җм• мҠ¬лЎ  м—ҶмқҢ)мқём§Җ вҖ” лһӯнӮ№В·л№„көҗмҡ©
function isPureStandard(r) {
  const d = distInfo(r);
  return !!(d && d.pure_standard === true);
}
// н‘ңмӨҖ л¶„лҘҳмқҙм§Җл§Ң мҲңмҲҳ н‘ңмӨҖмқҙ м•„лӢҢ ліҖнҳ•мқём§Җ вҖ” к°ңмқё л¶„м„қ н‘ңмӢқмҡ©
function isVariantStandard(r) {
  return distCat(r) === 'standard' && !isPureStandard(r);
}
function fmtKm(v) {
  if (v == null) return '?';
  // 1.5 вҶ’ "1.5", 40 вҶ’ "40", 0.75 вҶ’ "0.75"
  return v % 1 === 0 ? String(v) : String(v);
}
function distBadge(r) {
  const d = distInfo(r);
  const cat = classifyDistance(d) || 'other';
  const cls = clsOfCat(cat);
  const label = labelOfCat(cat);
  let title = '';
  let extra = '';
  if (d) {
    title = `мҲҳмҳҒ ${fmtKm(d.swim_km)}km В· мӮ¬мқҙнҒҙ ${fmtKm(d.bike_km)}km В· лҹ° ${fmtKm(d.run_km)}km`;
    // н‘ңмӨҖ ITU кұ°лҰ¬л©ҙ лқјлІЁл§Ң, к·ё мҷём—” мӢӨм ң km лі‘кё°
    if (['standard','sprint','half','full','super_sprint'].indexOf(cat) === -1) {
      // custom: мқҙлҜё labelм—җ kmмқҙ л“Өм–ҙмһҲмқҢ
    } else if (cat !== 'standard') {
      extra = ` В· ${fmtKm(d.swim_km)}/${fmtKm(d.bike_km)}/${fmtKm(d.run_km)}`;
    }
  }
  // н‘ңмӨҖ л¶„лҘҳмқёлҚ° мҲңмҲҳ н‘ңмӨҖмқҙ м•„лӢҲл©ҙ 'ліҖнҳ•' л°°м§Җ л¶Җм°© (н—ӨлҚ” кё°л°ҳ)
  let variantTag = '';
  if (cat === 'standard' && d && d.pure_standard === false) {
    const vt = d.variant_type || '';
    const reason = d.variant_reason || '';
    let short = 'ліҖнҳ•';
    let tip = reason || 'н‘ңмӨҖ мҪ”мҠӨ ліҖнҳ•';
    if (vt === 'duathlon')            short = 'л“Җм• мҠ¬лЎ ', tip = 'л“Җм• мҠ¬лЎ  В· ' + reason;
    else if (vt === 'swim_shortened') short = 'мҲҳмҳҒ лӢЁм¶•', tip = 'мҲҳмҳҒ кұ°лҰ¬ лӢЁм¶• В· ' + reason;
    else if (vt === 'bike_variant')   short = 'мӮ¬мқҙнҒҙ ліҖнҳ•', tip = 'мӮ¬мқҙнҒҙ кұ°лҰ¬ ліҖнҳ• В· ' + reason;
    else if (vt === 'time_flagged')   short = 'ліҖнҳ•', tip = 'мӢңк°„ кё°л°ҳ мқҙмғҒ к°җм§Җ В· ' + reason;
    variantTag = `<span class="variant-tag" title="${escapeAttr(tip)}">${short}</span>`;
  }
  return `<span class="dist-pill ${cls}" title="${escapeAttr(title)}">${label}${extra}</span>${variantTag}`;
}
function distSummary(r) {
  const d = distInfo(r);
  if (!d) return '';
  return `${d.swim_km ?? '?'}/${d.bike_km ?? '?'}/${d.run_km ?? '?'}km`;
}

// HH:MM:SS[:ms] or MM:SS вҶ’ seconds (returns null if invalid/empty)
function toSec(s) {
  if (!s || s === '-' || s === '00:00:00') return null;
  const parts = s.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 4) return parts[0]*3600 + parts[1]*60 + parts[2] + parts[3]/1000;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return null;
}
// м…Җ н‘ңмӢң: л№Ҳ к°’ вҶ’ "вҖ”" (na), outlier вҶ’ "вҖ”" (bad, мӣҗліё мһ…л Ҙ мҳӨлҘҳ м¶”м •)
// н•ңлҸ„: T1 30л¶„ мҙҲкіј / T2 10л¶„ мҙҲкіј вҶ’ outlier
const T1_MAX_SEC = 30 * 60;
const T2_MAX_SEC = 10 * 60;
function isOutlier(kind, sec) {
  if (sec == null) return false;
  if (kind === 't1' && sec > T1_MAX_SEC) return true;
  if (kind === 't2' && sec > T2_MAX_SEC) return true;
  return false;
}
function fmtCell(raw, kind) {
  const sec = toSec(raw);
  if (sec == null) return '<span class="na">вҖ”</span>';
  if (isOutlier(kind, sec)) {
    return `<span class="bad" title="мӣҗліё лҚ°мқҙн„° мҳӨлҘҳлЎң м¶”м • (${escapeHtml(raw)})">вҖ”</span>`;
  }
  // ms нҸ¬н•Ёмқҙкұ°лӮҳ л№„м •к·ң нҸ¬л§· вҶ’ м •к·ңнҷ”
  if (raw.split(':').length !== 3 || raw.length < 8) {
    return escapeHtml(fmtSec(sec));
  }
  return escapeHtml(raw);
}
// м°ЁнҠёмҡ© м •м ң: t1/t2 outlierлҠ” nullлЎң
function cleanSec(raw, kind) {
  const s = toSec(raw);
  if (s == null) return null;
  if (isOutlier(kind, s)) return null;
  return s;
}

// seconds вҶ’ HH:MM:SS
function fmtSec(s) {
  if (s == null) return '-';
  s = Math.round(s);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return (h>0 ? String(h).padStart(2,'0')+':' : '') +
         String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

async function load() {

    const [dataRes, distRes] = await Promise.all([
      fetch('data.json?ts=' + ts),
      fetch('distances.json?ts=' + ts).catch(() => null),

    DATA = await dataRes.json();

  if (filtered.length === 0) {
    profileDiv.innerHTML = '';
    statsDiv.innerHTML = ''; chartsDiv.innerHTML = '';
    resDiv.innerHTML = '<div class="empty">н•„н„°м—җ л§һлҠ” кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
    recHead.style.display = 'none';
    return;
  }

  renderProfile(q, clubF, filtered, document.getElementById('profile'));
  renderStats(filtered, statsDiv);
  renderCharts(filtered, chartsDiv);
  renderTable(filtered, resDiv);
  recHead.style.display = '';
}

function renderProfile(name, clubF, filtered, div) {
  // н”„лЎңн•„ л¶„м„қмқҖ кұ°лҰ¬ н•„н„°мҷҖ л¬ҙкҙҖн•ҳкІҢ к·ё м„ мҲҳмқҳ 'м „мІҙ кё°лЎқ'мқ„ л¶„м„қ
  // мҶҢмҶҚк№Ңм§Җл§Ң л°ҳмҳҒ (лҸҷлӘ…мқҙмқё кө¬л¶„мҡ©)
  let all = DATA.filter(r => r.name === name);
  if (clubF) all = all.filter(r => (r.club || '(мҶҢмҶҚм—ҶмқҢ)') === clubF);

  // 1) к°•м җ кө¬к°„ л¶„м„қ: к°ҷмқҖ (лҢҖнҡҢ, л¶Җл¬ё) м•Ҳм—җм„ң м„ мҲҳмқҳ кө¬к°„лі„ л°ұл¶„мң„ кі„мӮ°
  //    л°ұл¶„мң„к°Җ лӮ®мқ„мҲҳлЎқ к°•м җ. мҲҳмҳҒ/мӮ¬мқҙнҒҙ/лҹ° л№„көҗ вҶ’ мғҒлҢҖм ҒмңјлЎң к°ҖмһҘ к°•н•ң кө¬к°„ м°ҫкё°
  //    вҖ» н‘ңмӨҖ ліҖнҳ•(л“Җм• мҠ¬лЎ В·лӢЁм¶•)мқҖ мҲҳмҳҒ/лҹ° мқҳлҜёк°Җ лӢ¬лқј к°•м җ л¶„м„қм—җм„ң м ңмҷё
  const segPcts = { s: [], b: [], r: [] };
  all.forEach(rec => {
    if (isVariantStandard(rec)) return; // ліҖнҳ• м ңмҷё
    const same = DATA.filter(x => x.tour === rec.tour && x.part === rec.part);
    if (same.length < 3) return;
    const mySwim = cleanSec(rec.swim, 'swim');
    const myBike = cleanSec(rec.bike, 'bike');
    const myRun  = cleanSec(rec.run, 'run');
    const allSwim = same.map(x => cleanSec(x.swim, 'swim')).filter(v => v != null).sort((a,b) => a-b);
    const allBike = same.map(x => cleanSec(x.bike, 'bike')).filter(v => v != null).sort((a,b) => a-b);
    const allRun  = same.map(x => cleanSec(x.run,  'run')).filter(v => v != null).sort((a,b) => a-b);
    const pct = (me, arr) => {
      if (me == null || arr.length === 0) return null;
      let rank = arr.findIndex(v => v >= me);
      if (rank === -1) rank = arr.length;
      return ((rank + 1) / arr.length) * 100; // мғҒмң„ X%
    };
    const ps = pct(mySwim, allSwim);
    const pb = pct(myBike, allBike);
    const pr = pct(myRun,  allRun);
    if (ps != null) segPcts.s.push(ps);
    if (pb != null) segPcts.b.push(pb);
    if (pr != null) segPcts.r.push(pr);
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const segAvgPct = { s: avg(segPcts.s), b: avg(segPcts.b), r: avg(segPcts.r) };

  // к°•м җ/м•Ҫм җ кІ°м •
  const valid = ['s','b','r'].filter(k => segAvgPct[k] != null);
  let strongest = null, weakest = null;
  if (valid.length >= 2) {
    valid.sort((a,b) => segAvgPct[a] - segAvgPct[b]); // лӮ®мқ„мҲҳлЎқ к°•н•Ё
    strongest = valid[0];
    weakest = valid[valid.length - 1];
  }
  const SEG_NAME = { s: 'мҲҳмҳҒ', b: 'мӮ¬мқҙнҒҙ', r: 'лҹ°' };

  // 2) кұ°лҰ¬ м№ҙн…Ңкі лҰ¬лі„ лІ мҠӨнҠё
  const byCat = {};
  all.forEach(r => {
    const cat = distCat(r);
    const tot = cleanSec(r.total, 'total');
    if (tot == null) return;
    if (!byCat[cat] || tot < byCat[cat].tot) byCat[cat] = { tot, r };
  });
  const CAT_ORDER = ['sprint','short','standard','half','full','other'];
  const bestRows = CAT_ORDER.filter(c => byCat[c]).map(c => {
    const item = byCat[c];
    return `<div class="best-row">
      <div><span class="br-dist">${DIST_LABEL[c] || c}</span>
        <span class="br-sub">${escapeHtml(item.r.tour)} В· ${escapeHtml(item.r.date)}</span></div>
      <div class="br-time">${fmtSec(item.tot)}</div>
    </div>`;
  }).join('');

  // 3) к°ңм„  м¶”м„ё (мөңк·ј кұ°лҰ¬ м№ҙн…Ңкі лҰ¬ м•Ҳм—җм„ңл§Ң л№„көҗ к°ҖлҠҘ) вҖ” нҳ„мһ¬ н•„н„°(filtered)мқҳ мҙқкё°лЎқ м„ нҳ• м¶”м„ё
  let trendHtml = '';
  const ft = filtered.map(r => ({ date: r.date, sec: cleanSec(r.total, 'total') })).filter(x => x.sec != null);
  if (ft.length >= 3) {
    ft.sort((a,b) => a.date.localeCompare(b.date));
    // лӢЁмҲң м„ нҳ•нҡҢк·Җ: x = index, y = sec
    const n = ft.length;
    const xs = ft.map((_,i) => i);
    const ys = ft.map(x => x.sec);
    const mx = xs.reduce((a,b)=>a+b,0)/n;
    const my = ys.reduce((a,b)=>a+b,0)/n;
    let num=0, den=0;
    for (let i=0;i<n;i++) { num += (xs[i]-mx)*(ys[i]-my); den += (xs[i]-mx)**2; }
    const slope = den === 0 ? 0 : num/den; // 1нҡҢ м¶ңм „лӢ№ ліҖнҷ”(мҙҲ)
    const totalChange = slope * (n - 1);
    const direction = slope < -1 ? 'down' : (slope > 1 ? 'up' : 'flat');
    const dclass = direction === 'down' ? 'trend-down' : (direction === 'up' ? 'trend-up' : '');
    const dword = direction === 'down' ? 'к°ңм„  мӨ‘ вҶ—' : (direction === 'up' ? 'м•…нҷ” вҶҳ' : 'м•Ҳм •');
    const firstD = ft[0].date, lastD = ft[ft.length-1].date;
    trendHtml = `<div class="trend-line">
      ${firstD.slice(0,7)} вҶ’ ${lastD.slice(0,7)} <b class="${dclass}">${dword}</b><br>
      ${n}нҡҢ м¶ңм „ кё°к°„ лҸҷм•Ҳ мҙқкё°лЎқмқҙ <b class="${dclass}">${slope < 0 ? 'вҲ’' : '+'}${fmtSec(Math.abs(totalChange))}</b> (мҙқ ${slope < 0 ? 'лӢЁм¶•' : 'мҰқк°Җ'})
    </div>`;
  } else {
    trendHtml = '<div class="trend-line muted">м¶”м„ё л¶„м„қм—җлҠ” 3нҡҢ мқҙмғҒ кё°лЎқмқҙ н•„мҡ”н•©лӢҲлӢӨ.</div>';
  }

  // к°•м җ л°” л ҢлҚ” (мғҒмң„ % лӮ®мқ„мҲҳлЎқ мҷјмӘҪ = к°•н•Ё)
  const strengthBar = (k) => {
    const p = segAvgPct[k];
    if (p == null) return '';
    const markPos = Math.max(0, Math.min(100, p));
    return `<div class="strength-bar">
      <div class="sb-label">${SEG_NAME[k]}</div>
      <div class="sb-track">
        <div class="sb-fill"></div>
        <div class="sb-mark" style="left: ${markPos}%"></div>
      </div>
      <div class="sb-val">мғҒмң„ ${p.toFixed(0)}%</div>
    </div>`;
  };

  const strengthTag = strongest
    ? `<span class="strength-tag tag-strong">к°•м җ: ${SEG_NAME[strongest]}</span>` +
      (weakest && weakest !== strongest ? ` <span class="strength-tag tag-weak">ліҙк°•: ${SEG_NAME[weakest]}</span>` : '')
    : '<span class="strength-tag tag-neutral">л¶„м„қ лҚ°мқҙн„° л¶ҖмЎұ</span>';

  // 4) м „мІҙ н’Җ кё°л°ҳ л¶„м„қ: н•„н„°лҗң кё°лЎқ(к°ҷмқҖ кұ°лҰ¬ м№ҙн…Ңкі лҰ¬лЎң м ңн•ңлҗЁ) м•Ҳм—җм„ң
  //    ліёмқё лІ мҠӨнҠё кө¬к°„ мӢңк°„кіј м „мІҙ н’Җ(к°ҷмқҖ кұ°лҰ¬ м№ҙн…Ңкі лҰ¬) л¶„нҸ¬ л№„көҗ
  let popHtml = '';
  if (filtered.length > 0) {
    const primaryCat = distCat(filtered[0]);
    const pop = POP_STATS[primaryCat];
    if (pop && pop.n > 0) {
      const myBest = {
        swim: Math.min(...filtered.map(r => cleanSec(r.swim,'swim')).filter(v => v != null), Infinity),
        bike: Math.min(...filtered.map(r => cleanSec(r.bike,'bike')).filter(v => v != null), Infinity),
        run:  Math.min(...filtered.map(r => cleanSec(r.run, 'run')).filter(v => v != null), Infinity),
        total:Math.min(...filtered.map(r => cleanSec(r.total,'total')).filter(v => v != null), Infinity),
      };
      const popRow = (key, label) => {
        const myVal = myBest[key];
        const pctRank = percentileRank(pop[key].sorted, myVal);
        if (myVal === Infinity || pctRank == null) {
          return `<div class="pop-row"><span class="p-label">${label}</span><span class="p-val muted">вҖ”</span></div>`;
        }
        return `<div class="pop-row">
          <span class="p-label">${label}</span>
          <span class="p-val">${fmtSec(myVal)}</span>
          <div class="p-bar"><div class="p-bar-fill" style="width:${Math.max(2, pctRank)}%"></div></div>
          <span class="p-pct">мғҒмң„ ${pctRank.toFixed(0)}%</span>
        </div>`;
      };
      popHtml = `<div class="pf-card">
        <h3>м „мІҙ н’Җ лҢҖл№„ (${DIST_LABEL[primaryCat] || primaryCat} В· n=${pop.n.toLocaleString()})</h3>
        ${popRow('swim','мҲҳмҳҒ')}
        ${popRow('bike','мӮ¬мқҙнҒҙ')}
        ${popRow('run','лҹ°')}
        ${popRow('total','мҙқкё°лЎқ')}
      </div>`;
    }
  }

  // 5) л№„мҠ·н•ң кІҪмҹҒ м„ мҲҳ + 6) мқёмӮ¬мқҙнҠёлҘј мң„н•ң лҚ°мқҙн„° мӨҖл№„
  let rivalsHtml = '';
  let insightHtml = '';
  let sharedAbove = [], sharedBelow = [], sharedPrimaryCat = null, sharedMyBestTot = null, sharedMyBestSeg = null;
  if (filtered.length > 0) {
    const primaryCat = distCat(filtered[0]);
    sharedPrimaryCat = primaryCat;
    // лқјмқҙлІҢ/мқёмӮ¬мқҙнҠё л№„көҗлҠ” мҲңмҲҳ н‘ңмӨҖл§Ң мӮ¬мҡ© (к°қкҙҖм„ұ). filtered лӮҙм—җм„ң мҲңмҲҳл§Ң м¶”м¶ң.
    const fairPool = primaryCat === 'standard'
      ? filtered.filter(r => isPureStandard(r))
      : filtered;
    const myBestTot = Math.min(
      ...fairPool.map(r => cleanSec(r.total, 'total')).filter(v => v != null),
      Infinity
    );
    sharedMyBestTot = myBestTot === Infinity ? null : myBestTot;
    sharedMyBestSeg = {
      swim: Math.min(...fairPool.map(r => cleanSec(r.swim, 'swim')).filter(v => v != null), Infinity),
      bike: Math.min(...fairPool.map(r => cleanSec(r.bike, 'bike')).filter(v => v != null), Infinity),
      run:  Math.min(...fairPool.map(r => cleanSec(r.run,  'run' )).filter(v => v != null), Infinity),
    };
    if (myBestTot !== Infinity) {
      const myKey = name + '||' + (clubF || '(мҶҢмҶҚм—ҶмқҢ)');
      // ліёмқёмқҙ м¶ңм „н•ң л¶Җл¬ё лӘ©лЎқ вҖ” к°ҷмқҖ л¶Җл¬ём—җм„ң лӣҙ м„ мҲҳл§Ң л№„көҗ лҢҖмғҒмңјлЎң мӮјлҠ”лӢӨ
      const myParts = new Set(filtered.map(r => r.part));
      // н‘ңмӨҖ м№ҙн…Ңкі лҰ¬л©ҙ мҲңмҲҳ н‘ңмӨҖ(1.5/40/10)л§Ң л№„көҗ лҢҖмғҒмңјлЎң вҖ” лӢЁм¶•/л“Җм• мҠ¬лЎ  м ңмҷё
      const requirePure = primaryCat === 'standard';
      const bestMap = {};
      for (const r of DATA) {
        if (distCat(r) !== primaryCat) continue;
        if (!myParts.has(r.part)) continue;  // к°ҷмқҖ л¶Җл¬ёл§Ң
        if (requirePure && !isPureStandard(r)) continue;
        const tot = cleanSec(r.total, 'total');
        const sw  = cleanSec(r.swim, 'swim');
        const bk  = cleanSec(r.bike, 'bike');
        const rn  = cleanSec(r.run, 'run');
        if (tot == null || sw == null || bk == null || rn == null) continue;
        const k = r.name + '||' + (r.club || '(мҶҢмҶҚм—ҶмқҢ)');
        if (k === myKey) continue;
        if (!bestMap[k] || tot < bestMap[k].tot) bestMap[k] = { k, tot, rec: r };
      }
      const rivals = Object.values(bestMap).sort((a, b) => a.tot - b.tot);
      let idx = 0;
      while (idx < rivals.length && rivals[idx].tot < myBestTot) idx++;
      const above = rivals.slice(Math.max(0, idx - 3), idx);
      const below = rivals.slice(idx, idx + 3);
      sharedAbove = above; sharedBelow = below;

      const rivalStrength = (rec) => {
        const same = DATA.filter(x => x.tour === rec.tour && x.part === rec.part);
        if (same.length < 3) return null;
        const arr = (k) => same.map(x => cleanSec(x[k], k)).filter(v => v != null).sort((a,b)=>a-b);
        const pct = (me, a) => {
          if (me == null || a.length === 0) return 999;
          let rk = a.findIndex(v => v >= me);
          if (rk === -1) rk = a.length;
          return ((rk + 1) / a.length) * 100;
        };
        const entries = [
          ['мҲҳмҳҒ', pct(cleanSec(rec.swim,'swim'), arr('swim'))],
          ['мӮ¬мқҙнҒҙ', pct(cleanSec(rec.bike,'bike'), arr('bike'))],
          ['лҹ°', pct(cleanSec(rec.run,'run'), arr('run'))],
        ].sort((a, b) => a[1] - b[1]);
        if (entries[0][1] >= 999) return null;
        return entries[0][0] + ' мғҒмң„ ' + entries[0][1].toFixed(0) + '%';
      };

      const rowHtml = (rv, kind) => {
        const [nm, cl] = rv.k.split('||');
        const href = './?q=' + encodeURIComponent(nm) +
          (cl && cl !== '(мҶҢмҶҚм—ҶмқҢ)' ? '&club=' + encodeURIComponent(cl) : '');
        const st = rivalStrength(rv.rec) || '-';
        const diff = rv.tot - myBestTot;
        const diffStr = (diff >= 0 ? '+' : 'вҲ’') + fmtSec(Math.abs(diff));
        return `<div class="rival-row ${kind}">
          <div class="rv-name"><a href="${href}">${escapeHtml(nm)}</a>
            <span class="rv-club">${escapeHtml(cl)}</span></div>
          <div class="rv-time">${fmtSec(rv.tot)}<span class="rv-diff">${diffStr}</span></div>
          <div class="rv-strength">${escapeHtml(st)}</div>
        </div>`;
      };

      const aboveHtml = above.length
        ? above.map(r => rowHtml(r, 'above')).join('')
        : '<div class="muted" style="padding:8px 10px;font-size:11px">лҚ” л№ лҘё м„ мҲҳ лҚ°мқҙн„° м—ҶмқҢ</div>';
      const belowHtml = below.length
        ? below.map(r => rowHtml(r, 'below')).join('')
        : '<div class="muted" style="padding:8px 10px;font-size:11px">лҚ” лҠҗлҰ° м„ мҲҳ лҚ°мқҙн„° м—ҶмқҢ</div>';
      const meStrength = strongest ? (SEG_NAME[strongest] + ' к°•м җ') : '-';
      const meHtml = `<div class="rival-row me">
        <div class="rv-name"><b>${escapeHtml(name)}</b>
          <span class="rv-club">${escapeHtml(clubF || '(мҶҢмҶҚм—ҶмқҢ)')}</span></div>
        <div class="rv-time">${fmtSec(myBestTot)}<span class="rv-diff">лӮҳмқҳ лІ мҠӨнҠё</span></div>
        <div class="rv-strength">${escapeHtml(meStrength)}</div>
      </div>`;

      rivalsHtml = `<div class="pf-card rivals-card">
        <h3>л№„мҠ·н•ң кІҪмҹҒ м„ мҲҳ В· ${DIST_LABEL[primaryCat] || primaryCat} кё°мӨҖ</h3>
        ${aboveHtml}
        ${meHtml}
        ${belowHtml}
      </div>`;
    }
  }

  // 6) мў…н•© л¶„м„қ В· ліҙмҷ„ м ңм•Ҳ (мһҗм—°м–ҙ мқёмӮ¬мқҙнҠё нҸ¬н•Ё)
  if (strongest && weakest && strongest !== weakest && sharedPrimaryCat && sharedMyBestTot != null) {
    const SEG_POP_KEY = { s: 'swim', b: 'bike', r: 'run' };
    const SEG_MB_KEY  = { s: 'swim', b: 'bike', r: 'run' };
    const myB = sharedMyBestSeg;

    // л¶Җл¬ёлі„лЎң кё°лЎқ мҲҳмӨҖмқҙ лӢӨлҘҙлҜҖлЎң, к°ҷмқҖ кұ°лҰ¬ м№ҙн…Ңкі лҰ¬ м „мІҙк°Җ м•„лӢҲлқј
    // ліёмқёмқҙ м¶ңм „н•ң 'л¶Җл¬ё(sPart)' кё°мӨҖмңјлЎң л¶„нҸ¬лҘј кө¬м¶•н•ҙм„ң м Ҳм•Ҫ мӢңк°„мқ„ м¶”мӮ°н•ңлӢӨ.
    const myParts = Array.from(new Set(filtered.map(r => r.part))).sort();
    const partPool = { swim: [], bike: [], run: [] };
    for (const r of DATA) {
      if (distCat(r) !== sharedPrimaryCat) continue;
      if (!myParts.includes(r.part)) continue;
      // н‘ңмӨҖмқҖ мҲңмҲҳ н‘ңмӨҖл§Ң н’Җм—җ нҸ¬н•Ё (ліҖнҳ•/л“Җм• мҠ¬лЎ  м ңмҷё)
      if (sharedPrimaryCat === 'standard' && !isPureStandard(r)) continue;
      const sw = cleanSec(r.swim, 'swim');
      const bk = cleanSec(r.bike, 'bike');
      const rn = cleanSec(r.run,  'run');
      if (sw != null) partPool.swim.push(sw);
      if (bk != null) partPool.bike.push(bk);
      if (rn != null) partPool.run.push(rn);
    }
    partPool.swim.sort((a,b)=>a-b);
    partPool.bike.sort((a,b)=>a-b);
    partPool.run.sort((a,b)=>a-b);
    const partPoolN = Math.max(partPool.swim.length, partPool.bike.length, partPool.run.length);

    // м•Ҫм җ кө¬к°„мқ„ к°•м җ мҲҳмӨҖмңјлЎң лҒҢм–ҙмҳ¬л ёмқ„ л•Ң м Ҳм•Ҫ к°ҖлҠҘ мӢңк°„ (к°ҷмқҖ л¶Җл¬ё н’Җ кё°мӨҖ)
    let savings = null, savingsTarget = null;
    const weakArr = partPool[SEG_POP_KEY[weakest]];
    if (weakArr && weakArr.length > 0) {
      const targetIdx = Math.max(0, Math.min(weakArr.length - 1, Math.floor((segAvgPct[strongest] / 100) * weakArr.length) - 1));
      const target = weakArr[targetIdx];
      const myWeakSec = myB[SEG_MB_KEY[weakest]];
      if (target != null && myWeakSec !== Infinity && myWeakSec > target) {
        savings = myWeakSec - target;
        savingsTarget = target;
      }
    }

    // лҚ” л№ лҘё лқјмқҙлІҢ лҢҖл№„ кө¬к°„ нҸүк·  кІ©м°Ё
    const rivalGap = { s: [], b: [], r: [] };
    for (const rv of sharedAbove) {
      const rs = cleanSec(rv.rec.swim, 'swim');
      const rb = cleanSec(rv.rec.bike, 'bike');
      const rr = cleanSec(rv.rec.run,  'run');
      if (myB.swim !== Infinity && rs != null) rivalGap.s.push(myB.swim - rs);
      if (myB.bike !== Infinity && rb != null) rivalGap.b.push(myB.bike - rb);
      if (myB.run  !== Infinity && rr != null) rivalGap.r.push(myB.run  - rr);
    }
    const avgGap = k => rivalGap[k].length ? rivalGap[k].reduce((a,b)=>a+b,0)/rivalGap[k].length : null;
    const gS = avgGap('s'), gB = avgGap('b'), gR = avgGap('r');
    const gapList = [['s', gS], ['b', gB], ['r', gR]].filter(([,g]) => g != null);
    let biggestGap = null, smallestGap = null;
    if (gapList.length > 0) {
      const sorted = [...gapList].sort((a,b) => b[1] - a[1]);
      biggestGap = sorted[0];
      smallestGap = sorted[sorted.length - 1];
    }

    // мһҗм—°м–ҙ мҡ”м•Ҫ мғқм„ұ
    const distLabel = DIST_LABEL[sharedPrimaryCat] || labelOfCat(sharedPrimaryCat);
    const n = filtered.length;
    const sp = segAvgPct[strongest], wp = segAvgPct[weakest];
    const gapPp = Math.round(wp - sp);

    // л¶Җл¬ё н‘ңкё°: лӘЁл“  л¶Җл¬ёмқ„ лӘ…мӢңм ҒмңјлЎң лӮҳм—ҙ (лҚ°мқҙн„° н•ҙм„қ мҳӨлҘҳ л°©м§Җ)
    const partsChipHtml = myParts
      .map(p => `<span class="part-chip">${escapeHtml(p)}</span>`).join(' ');
    const partsLabel = myParts.length === 1
      ? escapeHtml(myParts[0])
      : `${myParts.length}к°ң л¶Җл¬ё`;

    // л¶Җл¬ёлі„ м¶ңм „ нҡҹмҲҳ мғҒм„ё
    const partCount = {};
    filtered.forEach(r => { partCount[r.part] = (partCount[r.part] || 0) + 1; });

    let para1 = `<b>${distLabel} В· ${partsLabel}</b>м—җ <b>${n}нҡҢ</b> м¶ңм „н•ң кё°лЎқмқ„ кё°мӨҖмңјлЎң л¶„м„қн–ҲмҠөлӢҲлӢӨ. `;
    para1 += `<b>${name}</b>лӢҳмқҖ <b class="ins-strong">${SEG_NAME[strongest]}</b>м—җм„ң к°ҖмһҘ лӣ°м–ҙлӮң кІҪмҹҒл Ҙ(к°ҷмқҖ л¶Җл¬ё нҸүк·  <b>мғҒмң„ ${sp.toFixed(0)}%</b>)мқ„ ліҙмқҙкі , `;
    para1 += `л°ҳл©ҙ <b class="ins-weak">${SEG_NAME[weakest]}</b>мқҖ(лҠ”) мғҒмң„ <b>${wp.toFixed(0)}%</b>лЎң к°•м җ лҢҖл№„ <b>${gapPp}%p</b> кІ©м°Ёк°Җ мһҲмҠөлӢҲлӢӨ.`;

    let para2 = '';
    if (sharedAbove.length >= 2 && biggestGap && biggestGap[1] > 10) {
      const segKo = SEG_NAME[biggestGap[0]];
      para2 += `к°ҷмқҖ л¶Җл¬ём—җм„ң ліёмқёліҙлӢӨ л№ лҘё м„ мҲҳ ${sharedAbove.length}лӘ…кіј л№„көҗн•ҳл©ҙ, <b>${segKo}</b>м—җм„ң нҸүк·  <b>${fmtSec(biggestGap[1])}</b> л’ӨмІҳм ё мһҲм–ҙ мқҙ кө¬к°„мқҙ мҙқкё°лЎқ лӢЁм¶•мқҳ к°ҖмһҘ нҒ° л ҲлІ„лҰ¬м§Җмһ…лӢҲлӢӨ.`;
      if (smallestGap && smallestGap[0] !== biggestGap[0] && smallestGap[1] < 30) {
        para2 += ` л°ҳлҢҖлЎң <b>${SEG_NAME[smallestGap[0]]}</b>мқҖ(лҠ”) мқҙлҜё кІҪмҹҒмһҗ мҲҳмӨҖкіј кұ°мқҳ лҸҷл“ұ(нҸүк·  ${smallestGap[1] >= 0 ? '+' : 'вҲ’'}${fmtSec(Math.abs(smallestGap[1]))})н•©лӢҲлӢӨ.`;
      }
    } else if (sharedAbove.length === 0) {
      para2 = `к°ҷмқҖ л¶Җл¬ём—җ л№„көҗ к°ҖлҠҘн•ң лҚ” л№ лҘё м„ мҲҳк°Җ м—Ҷм–ҙ, ліёмқёмқҙ мғҒмң„к¶Ңм—җ мҶҚн•©лӢҲлӢӨ. кө¬к°„лі„ к· нҳ•мқ„ лҚ” лӢӨл“¬м–ҙ лӢӨмқҢ лӢЁкі„лЎң лӮҳм•„к°Ҳ мҲҳ мһҲмҠөлӢҲлӢӨ.`;
    }

    let para3 = '';
    if (savings != null && savings > 20) {
      para3 = `л§Ңм•Ҫ <b>${SEG_NAME[weakest]}</b>мқ„(лҘј) <b>${SEG_NAME[strongest]}</b>кіј к°ҷмқҖ мғҒмң„ ${sp.toFixed(0)}% мҲҳмӨҖ(${partsLabel} лӮҙ лӘ©н‘ң мӢңк°„ ${fmtSec(savingsTarget)})мңјлЎң лҒҢм–ҙмҳ¬лҰ¬л©ҙ, мҙқкё°лЎқмқҙ м•Ҫ <b class="ins-gain">${fmtSec(savings)}</b> лӢЁм¶•лҗ  кІғмңјлЎң кё°лҢҖлҗ©лӢҲлӢӨ.`;
    }

    // л¶„м„қ кё°мӨҖ лӘ…мӢң л°°л„Ҳ вҖ” м •нҷ•н•ң л¶Җл¬ёлӘ…мқ„ лӘЁл‘җ лӮҳм—ҙ
    const partsDetailList = myParts
      .map(p => `<li><b>${escapeHtml(p)}</b> В· ${partCount[p]}нҡҢ</li>`).join('');
    const multiWarn = myParts.length > 1
      ? `<div class="basis-warn">вҡ  м—¬лҹ¬ л¶Җл¬ёмқҙ м„һм—¬ мһҲмҠөлӢҲлӢӨ. л¶Җл¬ёлі„ кІҪмҹҒ мҲҳмӨҖ(м—ҳлҰ¬нҠё/лҸҷнҳёмқё/м—°л №лҢҖ)мқҙ лӢ¬лқј н•ҙм„қм—җ мЈјмқҳк°Җ н•„мҡ”н•©лӢҲлӢӨ. м •нҷ•н•ң л¶„м„қмқ„ мӣҗн•ҳмӢңл©ҙ <b>л¶Җл¬ё</b> н•„н„°м—җм„ң н•ҳлӮҳл§Ң м„ нғқн•ҙмЈјм„ёмҡ”.</div>`
      : '';
    const pureNote = sharedPrimaryCat === 'standard'
      ? `<div class="basis-note-pure">вҖ» н‘ңмӨҖ мҪ”мҠӨлҠ” <b>мҲңмҲҳ 1.5kmВ·40kmВ·10km лҢҖнҡҢ</b>л§Ң лқјмқҙлІҢВ·лӢЁм¶•мӢңк°„ кі„мӮ°м—җ мӮ¬мҡ©лҗ©лӢҲлӢӨ (л“Җм• мҠ¬лЎ В·мҲҳмҳҒ лӢЁм¶• л“ұ ліҖнҳ• м ңмҷё).</div>`
      : '';
    const basisNote = `<div class="insight-basis">
      <div class="basis-title">вҖ» л¶„м„қ кё°мӨҖ л¶Җл¬ё ${partPoolN ? `(к°ҷмқҖ л¶Җл¬ё лӮҙ н‘ңліё n=${partPoolN.toLocaleString()})` : ''}</div>
      <ul class="basis-parts">${partsDetailList}</ul>
      ${pureNote}
      ${multiWarn}
    </div>`;

    // нӣҲл Ё нҢҒ (м•Ҫм җкіј к°ҖмһҘ нҒ° кІ©м°Ё кө¬к°„ мӨ‘ мҡ°м„ мҲңмң„)
    const target = biggestGap && biggestGap[1] > 30 ? biggestGap[0] : weakest;
    const TIPS = {
      s: 'мЈј 2-3нҡҢ мҲҳмҳҒ нӣҲл Ё вҖ” мқён„°лІҢ(100mГ—10)лЎң нҢҢмӣҢ н–ҘмғҒ, мһҘкұ°лҰ¬(2-3km) м„ёнҠёлЎң м§Җкө¬л Ҙ, н’Җл“ңлқјмқҙ мҳҒмғҒмңјлЎң мәҗм№ҳВ·лЎӨл§Ғ нҸј м җкІҖ. мҳӨн”ҲмӣҢн„° м—°мҠө лі‘н–ү.',
      b: 'мЈј 2нҡҢ FTP мқён„°лІҢ(2Г—20л¶„ @85-90%) + мЈј 1нҡҢ мһҘкұ°лҰ¬(80-120km). мјҖмқҙлҚҳмҠӨ 85-95 мң м§Җ нӣҲл Ё, м—җм–ҙлЎң нҸ¬м§Җм…ҳ нҢҢмӣҢ м Ғмқ‘ к¶ҢмһҘ.',
      r: 'мЈј 20% лЈ°лЎң Z2 мЈјкұ°лҰ¬ мҰқлҹү + мЈј 1нҡҢ мқён„°лІҢ(400mГ—8 лҳҗлҠ” 1kmГ—5). лёҢлҰӯ(л°”мқҙнҒ¬вҶ’лҹ°) нӣҲл Ё мЈј 1нҡҢ, мҠӨнҠёлқјмқҙл“ңВ·л“ңлҰҙлЎң нҸј нҡЁмңЁнҷ”.',
    };
    const priorityKo = SEG_NAME[target];

    insightHtml = `<div class="pf-card insight-card">
      <h3>мў…н•© л¶„м„қ В· ліҙмҷ„ м ңм•Ҳ</h3>
      <div class="insight-tags">
        <span class="ins-tag ins-tag-good">к°•м җ В· ${SEG_NAME[strongest]}</span>
        <span class="ins-tag ins-tag-bad">ліҙмҷ„ В· ${SEG_NAME[weakest]}</span>
        ${biggestGap && biggestGap[1] > 30 ? `<span class="ins-tag ins-tag-focus">мөңмҡ°м„  нҲ¬мһҗ В· ${SEG_NAME[biggestGap[0]]}</span>` : ''}
      </div>
      ${basisNote}
      <div class="insight-para">${para1}</div>
      ${para2 ? `<div class="insight-para">${para2}</div>` : ''}
      ${para3 ? `<div class="insight-para">${para3}</div>` : ''}
      <div class="insight-tip"><b>к¶ҢмһҘ нӣҲл Ё (${priorityKo} мҡ°м„ )</b><br>${TIPS[target]}</div>
    </div>`;
  }

  // 7) н”„лЎңн•„ к°ңмҡ” н…ҚмҠӨнҠё (лҸ„мӢқнҷ” мң„ к°„лӢЁ мҡ”м•Ҫ вҖ” bio-style)
  let overviewHtml = '';
  if (all.length > 0) {
    const dates = all.map(r => r.date).filter(Boolean).sort();
    const firstYear = dates[0] ? dates[0].slice(0, 4) : '?';
    const lastYear  = dates[dates.length - 1] ? dates[dates.length - 1].slice(0, 4) : '?';
    const span = firstYear === lastYear ? firstYear + 'л…„' : firstYear + '~' + lastYear + 'л…„';
    const totalRaces = all.length;

    // мЈјмҡ” м¶ңм „ кұ°лҰ¬ л¶„нҸ¬
    const catCount = {};
    all.forEach(r => { const c = distCat(r); catCount[c] = (catCount[c] || 0) + 1; });
    const topCats = Object.entries(catCount).sort((a,b) => b[1] - a[1]).slice(0, 2);
    const catPhrase = topCats.map(([c, n]) =>
      `${DIST_LABEL[c] || labelOfCat(c)} ${n}нҡҢ`
    ).join(', ');
    const primaryCatLabel = topCats[0] ? (DIST_LABEL[topCats[0][0]] || labelOfCat(topCats[0][0])) : '';

    // мЈјл Ҙ кұ°лҰ¬мқҳ лІ мҠӨнҠё мҙқкё°лЎқ
    const primaryCat = topCats[0] ? topCats[0][0] : null;
    let bestLine = '';
    if (primaryCat) {
      const tots = all.filter(r => distCat(r) === primaryCat)
                      .map(r => cleanSec(r.total, 'total')).filter(v => v != null);
      if (tots.length > 0) {
        const bestT = Math.min(...tots);
        bestLine = `мЈјл Ҙ ${primaryCatLabel} лІ мҠӨнҠёлҠ” <b>${fmtSec(bestT)}</b>`;
      }
    }

    // нҸүк·  л¶Җл¬ё мҲңмң„ л°ұл¶„мң„
    let pctSum = 0, pctN = 0;
    all.forEach(r => {
      const same = DATA.filter(x => x.tour === r.tour && x.part === r.part);
      if (same.length > 1 && r.rank) {
        pctSum += (r.rank / same.length) * 100;
        pctN++;
      }
    });
    const avgPct = pctN ? (pctSum / pctN) : null;
    const rankLine = avgPct != null
      ? `к°ҷмқҖ л¶Җл¬ё лӮҙ нҸүк·  мҲңмң„лҠ” <b>мғҒмң„ ${avgPct.toFixed(0)}%</b> мҲҳмӨҖ`
      : '';

    // мҶҢмҶҚ
    const clubCounts = {};
    all.forEach(r => { if (r.club) clubCounts[r.club] = (clubCounts[r.club] || 0) + 1; });
    const topClub = Object.entries(clubCounts).sort((a,b) => b[1] - a[1])[0];
    const clubLine = topClub ? `мЈј мҶҢмҶҚмқҖ <b>${escapeHtml(topClub[0])}</b>` : '';

    // к°•м җ н•ңл§Ҳл””
    const strengthLine = strongest
      ? `кө¬к°„лі„лЎңлҠ” <b class="ins-strong">${SEG_NAME[strongest]}</b>мқҙ(к°Җ) к°ҖмһҘ к°•м җ`
      : '';

    // л¬ёмһҘ мЎ°лҰҪ вҖ” мқҳлҜё мһҲлҠ” мЎ°к°Ғл§Ң мқҙм–ҙл¶ҷмһ„
    const sentences = [];
    sentences.push(`<b>${escapeHtml(name)}</b>${clubF ? ` (${escapeHtml(clubF)})` : ''} м„ мҲҳлҠ” ${span} мӮ¬мқҙ мҙқ <b>${totalRaces}нҡҢ</b> лҢҖнҡҢм—җ м¶ңм „н–ҲмҠөлӢҲлӢӨ (${catPhrase}).`);
    const line2Parts = [clubLine, bestLine].filter(Boolean);
    if (line2Parts.length > 0) sentences.push(line2Parts.join(', ') + '.');
    const line3Parts = [rankLine, strengthLine].filter(Boolean);
    if (line3Parts.length > 0) sentences.push(line3Parts.join('мқҙл©°, ') + 'мһ…лӢҲлӢӨ.');

    overviewHtml = `<div class="profile-overview">${sentences.join(' ')}</div>`;
  }

  div.innerHTML =
    `<div class="profile-section">
      <h2>н”„лЎңн•„ л¶„м„қ <span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:6px">${escapeHtml(name)}${clubF?' В· '+escapeHtml(clubF):''}</span></h2>
      ${overviewHtml}
      <div class="profile-grid">
        ${insightHtml}
        <div class="pf-card">
          <h3>к°•м җ кө¬к°„ В· к°ҷмқҖ л¶Җл¬ё лӮҙ нҸүк·  мҲңмң„</h3>
          ${strengthTag}
          <div style="margin-top: 12px;">
            ${['s','b','r'].map(strengthBar).join('')}
          </div>
          ${valid.length === 0 ? '<div class="muted" style="margin-top:8px">л№„көҗ к°ҖлҠҘн•ң кө¬к°„ кё°лЎқ л¶ҖмЎұ</div>' : ''}
        </div>
        <div class="pf-card">
          <h3>кұ°лҰ¬лі„ лІ мҠӨнҠё</h3>
          ${bestRows || '<div class="muted">кұ°лҰ¬ м •ліҙ мһҲлҠ” кё°лЎқ м—ҶмқҢ</div>'}
        </div>
        <div class="pf-card">
          <h3>к°ңм„  м¶”м„ё В· нҳ„мһ¬ н•„н„° кё°мӨҖ</h3>
          ${trendHtml}
        </div>
        ${popHtml}
        ${rivalsHtml}
      </div>
    </div>`;
}

function renderStats(filtered, div) {
  const totals = filtered.map(r => toSec(r.total)).filter(v => v != null);
  const best = totals.length ? Math.min(...totals) : null;
  const bestRow = filtered.find(r => toSec(r.total) === best);

  // нҸүк·  л°ұл¶„мң„ (н•ҙлӢ№ л¶Җл¬ё/лҢҖнҡҢ м•Ҳм—җм„ң)
  let pctSum = 0, pctN = 0;
  filtered.forEach(r => {
    const same = DATA.filter(x => x.tour === r.tour && x.part === r.part);
    if (same.length > 1 && r.rank) {
      // (м „мІҙ - ліёмқёмҲңмң„ + 1) / м „мІҙ * 100  вҶ’ мғҒмң„%лЎң нҷҳмӮ°: ліёмқё мҲңмң„/м „мІҙ*100
      const topPct = (r.rank / same.length) * 100;
      pctSum += topPct; pctN++;
    }
  });
  const avgPct = pctN ? (pctSum / pctN) : null;

  div.innerHTML =
    '<div class="stat-grid">' +
    statCard('м¶ңм „ нҡҹмҲҳ', filtered.length + 'нҡҢ', filtered[0].date.slice(0,4) + ' ~ ' + filtered[filtered.length-1].date.slice(0,4)) +
    statCard('лІ мҠӨнҠё кё°лЎқ', fmtSec(best), bestRow ? bestRow.tour : '') +
    statCard('нҸүк·  мғҒмң„ %', avgPct != null ? avgPct.toFixed(1) + '%' : '-', 'к°ҷмқҖ л¶Җл¬ё лӮҙ нҸүк·  мҲңмң„ л°ұл¶„мң„') +
    '</div>';
}
function statCard(label, value, sub) {
  return '<div class="stat-card"><div class="stat-label">' + escapeHtml(label) + '</div>' +
         '<div class="stat-value">' + escapeHtml(value) + '</div>' +
         (sub ? '<div class="stat-sub">' + escapeHtml(sub) + '</div>' : '') + '</div>';
}

function renderCharts(filtered, div) {
  // race options for distribution chart
  const raceOpts = filtered.map((r,i) =>
    `<option value="${i}">${escapeHtml(r.date + ' В· ' + r.tour)}</option>`
  ).join('');
  const defaultIdx = filtered.length - 1;

  div.innerHTML =
    '<div class="two-col">' +
      '<div class="chart-box"><h2 style="margin-top:0">кё°лЎқ м¶”мқҙ</h2>' +
        '<div class="tabs" id="trendTabs">' +
          '<span class="tab active" data-metric="all">мў…н•©</span>' +
          '<span class="tab" data-metric="total">мҙқкё°лЎқ</span>' +
          '<span class="tab" data-metric="swim">мҲҳмҳҒ</span>' +
          '<span class="tab" data-metric="bike">мӮ¬мқҙнҒҙ</span>' +
          '<span class="tab" data-metric="run">лҹ°</span>' +
        '</div>' +
        '<canvas id="trendChart"></canvas></div>' +
      '<div class="chart-box"><h2 style="margin-top:0">к°ҷмқҖ л¶Җл¬ё лӮҙ ліёмқё мң„м№ҳ</h2>' +
        '<div class="race-pick">лҢҖнҡҢ м„ нғқ: <select id="raceSel">' + raceOpts + '</select></div>' +
        '<canvas id="distChart"></canvas></div>' +
    '</div>';

  // Trend data per metric
  const labels = filtered.map(r => r.date.replace(/^\d{4}\./, '').replace(/\s*~.*/, '')); // "MM.DD"
  const fullLabels = filtered.map(r => r.date + ' ' + r.tour);
  const series = {
    total: filtered.map(r => cleanSec(r.total, 'total')),
    swim:  filtered.map(r => cleanSec(r.swim, 'swim')),
    bike:  filtered.map(r => cleanSec(r.bike, 'bike')),
    run:   filtered.map(r => cleanSec(r.run, 'run')),
  };
  // кұ°лҰ¬ м№ҙн…Ңкі лҰ¬лі„лЎң нҸ¬мқёнҠё мҠӨнғҖмқј лӢӨлҘҙкІҢ
  const cats = filtered.map(r => distCat(r));
  const STYLE_MAP = { sprint:'triangle', short:'rect', standard:'circle', half:'rectRot', full:'star', other:'cross' };
  const pointStyles = cats.map(c => STYLE_MAP[c] || 'circle');
  const pointRadii  = cats.map(c => c === 'half' || c === 'full' ? 7 : 4);
  const isHalf = cats.map(c => c === 'half');
  const COLORS = {
    total: '#1a3e72',
    swim:  '#2aa9c0',
    bike:  '#e09f3e',
    run:   '#c24536',
  };
  const NAMES = { total: 'мҙқкё°лЎқ', swim: 'мҲҳмҳҒ', bike: 'мӮ¬мқҙнҒҙ', run: 'лҹ°' };

  function buildDatasets(metric) {
    if (metric === 'all') {
      // dual-axis combined view
      return {
        datasets: [
          { label: 'мҙқкё°лЎқ', data: series.total, borderColor: COLORS.total, backgroundColor: COLORS.total + '22', tension: 0.25, yAxisID: 'y', pointStyle: pointStyles, pointRadius: pointRadii },
          { label: 'мҲҳмҳҒ',   data: series.swim,  borderColor: COLORS.swim,  borderDash: [4,4], tension: 0.25, yAxisID: 'y2' },
          { label: 'мӮ¬мқҙнҒҙ', data: series.bike,  borderColor: COLORS.bike,  borderDash: [4,4], tension: 0.25, yAxisID: 'y2' },
          { label: 'лҹ°',     data: series.run,   borderColor: COLORS.run,   borderDash: [4,4], tension: 0.25, yAxisID: 'y2' },
        ],
        dual: true
      };
    }
    return {
      datasets: [{
        label: NAMES[metric],
        data: series[metric],
        borderColor: COLORS[metric],
        backgroundColor: COLORS[metric] + '33',
        tension: 0.25,
        fill: true,
        pointRadius: pointRadii,
        pointHoverRadius: pointRadii.map(r => r + 2),
        pointStyle: pointStyles,
      }],
      dual: false
    };
  }

  function buildOptions(dual, metric) {
    const opts = {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            title: (items) => {
              const i = items[0].dataIndex;
              const r = filtered[i];
              const cat = DIST_LABEL[cats[i]] || '';
              const ds = distSummary(r);
              return fullLabels[i] + (cat ? `  [${cat}${ds ? ' ' + ds : ''}]` : '');
            },
            label: (ctx) => ctx.dataset.label + ': ' + fmtSec(ctx.parsed.y),
          }
        },
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } }
      },
      scales: {
        x: { ticks: { font: { size: 11 } } }
      }
    };
    if (dual) {
      opts.scales.y  = { position: 'left',  title: { display: true, text: 'мҙқкё°лЎқ' }, ticks: { callback: v => fmtSec(v) } };
      opts.scales.y2 = { position: 'right', title: { display: true, text: 'кө¬к°„' }, grid: { drawOnChartArea: false }, ticks: { callback: v => fmtSec(v) } };
    } else {
      opts.scales.y = { title: { display: true, text: NAMES[metric] }, ticks: { callback: v => fmtSec(v) } };
      opts.plugins.legend.display = false;
    }
    return opts;
  }

  function drawTrend(metric) {
    if (charts.trend) charts.trend.destroy();
    const built = buildDatasets(metric);
    charts.trend = new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: { labels, datasets: built.datasets },
      options: buildOptions(built.dual, metric)
    });
  }
  drawTrend('all');

  document.querySelectorAll('#trendTabs .tab').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#trendTabs .tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      drawTrend(el.dataset.metric);
    });
  });

  const select = document.getElementById('raceSel');
  select.value = String(defaultIdx);
  const drawDist = () => {
    if (charts.dist) charts.dist.destroy();
    const r = filtered[Number(select.value)];
    const same = DATA.filter(x => x.tour === r.tour && x.part === r.part)
                     .map(x => ({ name: x.name, sec: toSec(x.total), rank: x.rank }))
                     .filter(x => x.sec != null);
    if (same.length === 0) return;
    same.sort((a,b) => a.sec - b.sec);
    // histogram bins
    const minS = same[0].sec, maxS = same[same.length-1].sec;
    const span = Math.max(1, maxS - minS);
    const binCount = Math.min(20, Math.max(6, Math.round(Math.sqrt(same.length))));
    const binSize = span / binCount;
    const bins = new Array(binCount).fill(0);
    const binLabels = [];
    for (let i = 0; i < binCount; i++) {
      binLabels.push(fmtSec(minS + binSize*i));
    }
    same.forEach(x => {
      let idx = Math.floor((x.sec - minS) / binSize);
      if (idx >= binCount) idx = binCount - 1;
      bins[idx]++;
    });
    const mySec = toSec(r.total);
    let myBin = Math.floor((mySec - minS) / binSize);
    if (myBin >= binCount) myBin = binCount - 1;
    if (myBin < 0) myBin = 0;
    const colors = bins.map((_, i) => i === myBin ? '#c24536' : '#9bb3d4');

    const myRank = r.rank;
    const total = same.length;
    const topPct = ((myRank / total) * 100).toFixed(1);

    charts.dist = new Chart(document.getElementById('distChart'), {
      type: 'bar',
      data: { labels: binLabels, datasets: [{ data: bins, backgroundColor: colors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: {
            display: true,
            text: `${r.part} В· мҙқ ${total}лӘ… мӨ‘ ${myRank}мң„ (мғҒмң„ ${topPct}%) В· ліёмқё ${fmtSec(mySec)}`,
            font: { size: 12 }
          },
          tooltip: { callbacks: { title: (it) => 'кө¬к°„: ' + binLabels[it[0].dataIndex] + '~', label: (ctx) => ctx.parsed.y + 'лӘ…' } }
        },
        scales: {
          x: { ticks: { font: { size: 9 }, maxRotation: 60, minRotation: 45 } },
          y: { title: { display: true, text: 'мқёмӣҗ' }, ticks: { precision: 0 } }
        }
      }
    });
  };
  select.addEventListener('change', drawDist);
  drawDist();
}

function renderTable(filtered, div) {
  div.innerHTML =
    '<div class="table-wrap"><table><thead><tr>' +
    '<th>лӮ м§ң</th><th>лҢҖнҡҢ</th><th>л¶Җл¬ё</th><th>мҶҢмҶҚ</th>' +
    '<th class="r">мҲңмң„</th><th class="r">мҲҳмҳҒ</th><th class="r">T1</th>' +
    '<th class="r">мӮ¬мқҙнҒҙ</th><th class="r">T2</th><th class="r">лҹ°</th><th class="r">мҙқкё°лЎқ</th>' +
    '</tr></thead><tbody>' +
    filtered.map(r => {
      const same = DATA.filter(x => x.tour === r.tour && x.part === r.part);
      const totalN = same.length;
      const rankStr = totalN > 0 ? `${r.rank}/${totalN}` : String(r.rank);
      return '<tr><td>' + escapeHtml(r.date) + '</td>' +
        '<td>' + escapeHtml(r.tour) + '</td>' +
        '<td>' + distBadge(r) + '<span class="pill">' + escapeHtml(r.part) + '</span></td>' +
        '<td>' + escapeHtml(r.club || '-') + '</td>' +
        '<td class="r">' + rankStr + '</td>' +
        '<td class="r">' + fmtCell(r.swim, 'swim') + '</td>' +
        '<td class="r">' + fmtCell(r.t1, 't1') + '</td>' +
        '<td class="r">' + fmtCell(r.bike, 'bike') + '</td>' +
        '<td class="r">' + fmtCell(r.t2, 't2') + '</td>' +
        '<td class="r">' + fmtCell(r.run, 'run') + '</td>' +
        '<td class="r"><b>' + fmtCell(r.total, 'total') + '</b></td></tr>';
    }).join('') +
    '</tbody></table></div>';
}

function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy && c.destroy());
  charts = {};
}

function fillSelect(id, opts, current) {
  const sel = document.getElementById(id);
  const placeholder = id === 'club' ? 'мҶҢмҶҚ м „мІҙ' : 'л¶Җл¬ё м „мІҙ';
  sel.innerHTML = '<option value="">' + placeholder + '</option>' +
    opts.map(o => '<option value="' + escapeAttr(o) + '"' +
      (current === o ? ' selected' : '') + '>' + escapeHtml(o) + '</option>').join('');
}
function fillDistSelect(cats, counts, current) {
  const sel = document.getElementById('dist');
  sel.innerHTML = '<option value="">кұ°лҰ¬ м „мІҙ</option>' +
    cats.map(c => {
      const label = (DIST_LABEL[c] || 'кё°нғҖ') + ' (' + counts[c] + ')';
      return '<option value="' + escapeAttr(c) + '"' +
        (current === c ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
    }).join('');
}
function pickClub(c) { document.getElementById('club').value = c; render(); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }

load();
</script>
